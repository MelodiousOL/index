<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Way Back Home | Sky: TGC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500&family=Pacifico&display=swap" rel="stylesheet">

    <style>
        :root {
            --sky-blue: #7dd3fc;
            --sky-gold: #fde047;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
            min-height: 100vh;
        }

        /* 淺色模式：轉化為雲海晴空 */
        body.light {
            background: linear-gradient(180deg, #e0f2fe 0%, #f1f5f9 100%);
            color: #1e293b;
        }

        /* 模擬星空/雲粒粒子 */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                              radial-gradient(1px 1px at 100px 150px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 50px 200px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            opacity: 0.3;
            z-index: 0;
            transition: opacity 0.5s ease;
        }
        body.light .stars {
            background-image: radial-gradient(1px 1px at 20px 30px, #7dd3fc, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 50px 200px, #38bdf8, rgba(0,0,0,0));
            opacity: 0.2;
        }

        .glass-story {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            transition: all 0.3s ease;
        }
        body.light .glass-story {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px rgba(125, 211, 252, 0.15);
        }

        /* 呼吸燈動畫 */
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 5px var(--sky-blue)); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 20px var(--sky-blue)); opacity: 1; }
        }
        .sky-light { animation: glow 4s infinite ease-in-out; }
        body.light .sky-light { filter: drop-shadow(0 0 10px #38bdf8); }

        /* 標題漸層切換 */
        .text-gradient-sky {
            background: linear-gradient(to bottom, #bae6fd, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        body.light .text-gradient-sky {
            background: linear-gradient(to bottom, #0369a1, #4338ca);
            -webkit-background-clip: text;
        }

        /* 淺色模式下故事內容的文字對比度強化 */
        body.light .glass-story {
            color: #334155 !important; /* Slate 700，比 600 更穩重好讀 */
        }

        body.light .glass-story section h2 {
            color: #0f172a !important; /* 近乎純黑的標題 */
        }

        body.light .glass-story p {
            color: #475569 !important; /* Slate 600，適合長文閱讀 */
        }

        body.light footer p {
            color: #64748b !important; /* 頁尾稍微變深 */
        }

        /* 分隔線在淺色模式下的顏色 */
        body.light .via-white\/10 {
            background-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.2), transparent) !important;
        }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light');
        }
    </script>
</head>
<body class="dark:bg-[#0f172a]">
    <script>
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    </script>

    <div class="stars"></div>

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-sky-400 transition group">
            <i class="ph ph-arrow-left transition-transform group-hover:-translate-x-1"></i> 
            <span class="font-mono text-sm tracking-widest">BACK TO GARDEN</span>
        </a>
    </nav>

    <main class="relative z-10 max-w-4xl mx-auto px-6 pt-32 pb-20 text-center">
        <div class="mb-10 mt-4 relative inline-block group">
            <div class="absolute inset-0 bg-sky-400/15 blur-[40px] rounded-full scale-125 animate-pulse"></div>
            <img src="/assets/img/sky_logo_white.webp" 
                 alt="Sky Logo" 
                 class="w-32 md:w-44 h-auto relative z-10 
                        filter drop-shadow-[0_0_12px_rgba(255,255,255,0.5)] 
                        hover:scale-105 transition-transform duration-700
                        sky-light">
        </div>

        <h1 class="text-4xl md:text-6xl font-['Pacifico'] text-gradient-sky mb-6">
            Way Back Home
        </h1>
        
        <p class="text-slate-400 body.light:text-slate-600 italic mb-12 tracking-[0.2em] transition-colors">「所有的遇見，都是久別重逢。」</p>

        <div class="mb-16 group">
            <h3 class="text-sm font-mono text-sky-400/60 mb-4 tracking-[0.3em] uppercase transition-colors">// Live Performance</h3>
            
            <div class="glass-story p-2 relative overflow-hidden shadow-2xl">
                <div class="aspect-video rounded-2xl overflow-hidden bg-slate-900">
                    <iframe 
                        src="https://drive.google.com/file/d/1DDj1R0NY1-Sbi0n0LvdsTccsZiYkJUM8/preview" 
                        class="w-full h-full border-0" 
                        allow="autoplay">
                    </iframe>
                </div>
                
                <div class="py-3 px-4 flex justify-between items-center text-xs text-slate-400">
                    <span class="flex items-center gap-2">
                        <i class="ph ph-music-notes-fill text-sky-400 animate-pulse"></i>
                        <span class="body.light:text-slate-600">Playing: Way Back Home (Piano Cover)</span>
                    </span>
                    <span class="font-mono body.light:text-slate-500">TGC SKY Instrument</span>
                </div>
            </div>
        </div>

        <div class="glass-story p-8 md:p-16 text-left space-y-12 leading-loose text-slate-300 transition-colors">
            <section class="space-y-4">
                <h2 class="text-xl font-bold text-white body.light:text-slate-800 flex items-center gap-2 transition-colors">
                    <i class="ph ph-wind text-sky-300 body.light:text-sky-500"></i> 初心：雲巢的風
                </h2>
                <p class="body.light:text-slate-600 transition-colors">
                    在《Sky 光遇》的世界裡，我們無名卻自由。雲巢的風輕拂而過，帶來柔和的瞬間，我在琴聲中，隨風漫遊，忘卻時間。
                </p>
            </section>

            <section class="space-y-4">
                <h2 class="text-xl font-bold text-white body.light:text-slate-800 flex items-center gap-2 transition-colors">
                    <i class="ph ph-star text-yellow-300 body.light:text-amber-500"></i> 星光：純粹的旋律
                </h2>
                <p class="body.light:text-slate-600 transition-colors">
                    每一個音符都是流動的光。當指尖觸碰琴鍵，我只想沉浸在旋律裡，感受遊戲世界的寧靜與美好，讓心隨音樂飛翔。
                </p>
            </section>

            <div class="h-[1px] bg-gradient-to-r from-transparent via-white/10 body.light:via-sky-200 to-transparent my-10"></div>

            <footer class="text-center">
                <p class="text-sm text-slate-500 mb-6 font-mono tracking-tighter">SINCE 2024.07.27 | TGC SKY MEMORY</p>
                <div class="flex justify-center gap-6">
                     <i class="ph ph-moon-stars text-2xl text-slate-600 hover:text-sky-400 transition-colors cursor-help"></i>
                     <i class="ph ph-bird text-2xl text-slate-600 hover:text-sky-400 transition-colors cursor-help"></i>
                     <i class="ph ph-shooting-star text-2xl text-slate-600 hover:text-sky-400 transition-colors cursor-help"></i>
                </div>
            </footer>
        </div>
    </main>

    <script>
        // 主題同步邏輯
        function syncTheme() {
            const isLight = document.body.classList.contains('light');
            // 這裡可以加入更多針對此頁面的特殊動態調整
        }
        
        // 初始執行一次
        syncTheme();
    </script>
</body>
</html>
