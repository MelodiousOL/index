<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Details | Melodia.L</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script> <link href="assets/..." rel="stylesheet"> <link href="../assets/..." rel="stylesheet">

    <style>
        :root { --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { background: #0f172a; color: #e2e8f0; font-family: 'Noto Sans TC', sans-serif; }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; }
        .nav-blur { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .iframe-container { position: relative; width: 100%; padding-bottom: 75%; height: 0; overflow: hidden; border-radius: 16px; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

    <nav id="shared-nav" class="fixed top-0 w-full z-50 nav-blur"></nav>

    <main class="max-w-6xl mx-auto px-6 pt-32 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card p-2 overflow-hidden">
                    <div class="iframe-container">
                        <iframe src="https://drive.google.com/file/d/1eTTdqJzAF9bC0lfYSmDj_uaAc9rIL1Qx/preview"></iframe>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass-card p-8">
                    <h2 class="text-2xl font-bold mb-6 text-indigo-300">Information</h2>
                    <ul class="space-y-4">
                        <li class="flex flex-col"><span class="text-xs text-slate-500 uppercase tracking-widest mb-1">Learning Unit</span><span class="text-lg font-medium">民主憲政與法治</span></li>
                        <li class="flex flex-col border-t border-white/5 pt-4"><span class="text-xs text-slate-500 uppercase tracking-widest mb-1">Date</span><span class="text-lg font-medium">2025 / 03 / 13</span></li>
                        <li class="flex flex-col border-t border-white/5 pt-4"><span class="text-xs text-slate-500 uppercase tracking-widest mb-1">Category</span><span class="text-lg font-medium text-purple-300">General Education</span></li>
                    </ul>
                </div>

                <div class="glass-card p-8">
                    <h3 class="font-bold mb-4 flex items-center gap-2 text-indigo-200 text-xl"><i class="ph ph-lightbulb text-indigo-400"></i> Note Summary</h3>
                    <p class="text-sm text-slate-400 leading-relaxed">探討現代公民社會的法律架構與民主核心價值。</p>
                </div>
            </div>
        </div>
    </main>

    <footer id="shared-footer"></footer>

    <script>
        function loadComponent(id, file) {
            fetch(file)
                .then(response => response.text())
                .then(data => { document.getElementById(id).innerHTML = data; });
        }
        // 執行載入
        loadComponent('shared-nav', 'nav.html');
        loadComponent('shared-footer', 'footer.html');
    </script>

</body>
</html>
